version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: iglesia_db
    restart: always
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_iglesia
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      # Si quieres autologueo para phpMyAdmin descomenta estas líneas:
      # PMA_USER: ${MYSQL_USER}
      # PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask_backend
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - DB_URL=${DB_URL}
    depends_on:
      - db
    restart: on-failure

volumes:
  mariadb_data:
